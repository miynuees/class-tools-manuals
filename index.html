<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교실 도구 메뉴얼</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #FAFAF7;
  --text: #2D3436;
  --text-soft: #8B8B8B;
  --border: #ECEAE3;
  --border-soft: #F2F0E9;
}

html, body { height: 100%; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

.wrap {
  max-width: 1040px;
  margin: 0 auto;
  padding: 80px 28px 60px;
}

.hero {
  text-align: center;
  margin-bottom: 64px;
}

.hero .label {
  display: inline-block;
  font-size: 0.78rem;
  letter-spacing: 3px;
  color: var(--text-soft);
  font-weight: 700;
  margin-bottom: 18px;
  text-transform: uppercase;
}

.hero h1 {
  font-family: 'Jua', sans-serif;
  font-size: 2.6rem;
  letter-spacing: -0.5px;
  margin-bottom: 14px;
  color: var(--text);
  font-weight: 400;
}

.hero p {
  font-size: 1rem;
  color: var(--text-soft);
  max-width: 480px;
  margin: 0 auto;
}

.cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 22px;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 38px 28px 32px;
  border: 1.5px solid var(--border-soft);
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}

.card:hover {
  transform: translateY(-5px);
  border-color: var(--card-color);
  box-shadow: 0 16px 40px rgba(0, 0, 0, 0.06);
}

.card-icon {
  width: 84px;
  height: 84px;
  border-radius: 50%;
  background: var(--card-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.6rem;
  margin-bottom: 22px;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.card:hover .card-icon {
  transform: scale(1.08) rotate(-5deg);
}

.card h2 {
  font-family: 'Jua', sans-serif;
  font-size: 1.35rem;
  margin-bottom: 10px;
  color: var(--text);
  font-weight: 400;
  letter-spacing: -0.2px;
}

.card .desc {
  font-size: 0.92rem;
  color: var(--text-soft);
  line-height: 1.7;
  margin-bottom: 26px;
  flex: 1;
}

.card .more {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--card-color);
  padding-bottom: 4px;
  border-bottom: 1.5px solid transparent;
  transition: border-color 0.2s, gap 0.2s;
}

.card:hover .more {
  border-color: var(--card-color);
  gap: 10px;
}

/* 카드별 색상 */
.card-character {
  --card-color: #4FB585;
  --card-bg: #F0F8F4;
}

.card-roles {
  --card-color: #5BA8E0;
  --card-bg: #F0F6FB;
}

.card-cleaning {
  --card-color: #45aaf2;
  --card-bg: #EFF6FE;
}

.footer {
  text-align: center;
  margin-top: 70px;
  font-size: 0.85rem;
  color: var(--text-soft);
}

.footer .divider {
  display: inline-block;
  width: 30px;
  height: 1px;
  background: var(--border);
  vertical-align: middle;
  margin: 0 12px;
}

@media (max-width: 860px) {
  .wrap { padding: 60px 24px 40px; }
  .cards { grid-template-columns: 1fr; gap: 18px; max-width: 480px; margin: 0 auto; }
  .hero { margin-bottom: 44px; }
  .hero h1 { font-size: 2.1rem; }
  .card { padding: 32px 24px 28px; }
}

@media (max-width: 540px) {
  .wrap { padding: 50px 20px 36px; }
  .hero h1 { font-size: 1.85rem; }
  .hero p { font-size: 0.93rem; }
}
</style>
</head>
<body>

<div class="wrap">

  <div class="hero">
    <div class="label">CLASSROOM TOOLS</div>
    <h1>교실 도구 메뉴얼</h1>
    <p>학급 운영에 함께 쓰는 작은 웹 도구들의 사용 안내서입니다.</p>
  </div>

  <div class="cards">

    <a class="card card-character" href="character.html">
      <div class="card-icon">🐣</div>
      <h2>우리 반 캐릭터 키우기</h2>
      <p class="desc">반 전체가 함께 칭찬을 모아 캐릭터를 5단계까지 성장시키는 학급 운영 게임</p>
      <span class="more">메뉴얼 보기 →</span>
    </a>

    <a class="card card-roles" href="roles.html">
      <div class="card-icon">👥</div>
      <h2>우리 반 1인1역</h2>
      <p class="desc">매일 1인1역 활동을 한 번의 클릭으로 체크하고 1년 동안의 기록을 한눈에</p>
      <span class="more">메뉴얼 보기 →</span>
    </a>

    <a class="card card-cleaning" href="cleaning.html">
      <div class="card-icon">🧹</div>
      <h2>청소 역할 뽑기</h2>
      <p class="desc">청소 시간 역할을 카드 뽑기로 정하고 진행률을 함께 체크하는 도구</p>
      <span class="more">메뉴얼 보기 →</span>
    </a>

  </div>

  <div class="footer">
    교실의 매일이 조금 더 즐겁기를<span class="divider"></span>made with ♥
  </div>

</div>

</body>
</html>
